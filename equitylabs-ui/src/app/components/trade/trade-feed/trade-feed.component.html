<div class="trades-panel">
  <div class="panel-header">
    <span class="text-xs font-bold">RECENT TRADES</span>
  </div>
  
  <div class="table-container">
    <table class="trades-table">
      <thead>
        <tr>
          <th class="text-xs text-muted">PRICE</th>
          <th class="text-xs text-muted">QUANTITY</th>
          <th class="text-xs text-muted">TIME</th>
          <th class="text-xs text-muted">TYPE</th>
        </tr>
      </thead>
      <tbody *ngIf="trades.length > 0">
        <tr *ngFor="let trade of trades">
          <td class="mono text-sm text-right" [ngClass]="trade.buyUserId === 'demo-user' ? 'text-success' : 'text-danger'">
            {{ trade.executedPrice | number:'1.2-2' }}
          </td>
          <td class="mono text-sm text-right">{{ trade.quantity }}</td>
          <td class="mono text-sm text-right text-secondary">{{ trade.tradedAt | date:'HH:mm:ss' }}</td>
          <td class="text-center">
            <span class="type-badge" [ngClass]="trade.buyUserId === 'demo-user' ? 'buy' : 'sell'">
              {{ trade.buyUserId === 'demo-user' ? 'BUY' : 'SELL' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="empty-state" *ngIf="trades.length === 0">
      <mat-icon class="icon">history</mat-icon>
      <p class="text-sm text-muted">No trades yet</p>
    </div>
  </div>
</div>
