<div class="trades-panel trade-card">
  <header class="panel-header">
    <span class="text-xs font-bold text-secondary">RECENT TRADES</span>
  </header>
  
  <div class="table-container">
    <table class="trades-table" *ngIf="trades.length > 0">
      <thead>
        <tr>
          <th>PRICE</th>
          <th>QUANTITY</th>
          <th>TIME</th>
          <th>SIDE</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let trade of trades" class="trade-row">
          <td class="mono text-sm" 
              [class.text-success]="trade.displaySide === 'BUY'"
              [class.text-danger]="trade.displaySide === 'SELL'"
              [class.text-primary]="trade.displaySide === 'TRADE'">
            {{ trade.executedPrice | number:'1.2-2' }}
          </td>
          <td class="mono text-sm">{{ trade.quantity }}</td>
          <td class="mono text-sm text-secondary">{{ trade.tradedAt | date:'HH:mm:ss' }}</td>
          <td class="text-center">
            <span class="type-badge" 
                  [class.buy]="trade.displaySide === 'BUY'"
                  [class.sell]="trade.displaySide === 'SELL'"
                  [class.neutral]="trade.displaySide === 'TRADE'">
              {{ trade.displaySide }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Clean Empty State -->
    <div class="empty-state" *ngIf="trades.length === 0">
      <p class="text-sm text-secondary">No trades yet</p>
    </div>
  </div>
</div>
