<div class="order-container trade-card">
  <!-- Sticky Header -->
  <header class="order-header">
    <span class="symbol-name font-bold">{{ symbol }} POSITION</span>
  </header>

  <div class="scroll-content">
    <!-- Action Toggles -->
    <div class="action-toggles">
      <button type="button" class="toggle-btn buy" [class.active]="isBuy" (click)="setOrderType(OrderType.BUY)">BUY</button>
      <button type="button" class="toggle-btn sell" [class.active]="!isBuy" (click)="setOrderType(OrderType.SELL)">SELL</button>
    </div>

    <!-- Main Form -->
    <form [formGroup]="orderForm" class="order-form">
      <div class="form-row">
        <label>Category</label>
        <select formControlName="orderCategory" class="form-input">
          <option [value]="OrderCategory.LIMIT">LIMIT</option>
          <option [value]="OrderCategory.MARKET">MARKET</option>
        </select>
      </div>

      <div class="form-row">
        <label>Price</label>
        <input type="number" formControlName="price" class="form-input mono" placeholder="0.00">
      </div>

      <div class="form-row">
        <label>Quantity</label>
        <input type="number" formControlName="quantity" class="form-input mono" placeholder="0">
      </div>

      <div class="total-display">
        <span class="label">Total Value</span>
        <span class="value mono">{{ totalValue | number:'1.2-2' }}</span>
      </div>

      <button type="button" 
              class="execution-btn" 
              [class.buy]="isBuy" 
              [class.sell]="!isBuy"
              (click)="submitOrder()">
        {{ isBuy ? 'PLACE BUY ORDER' : 'PLACE SELL ORDER' }}
      </button>
    </form>

    <!-- Scrollable Detail Sections -->
    <div class="detail-sections">
      <!-- Spread Section -->
      <section class="detail-card spread-section">
        <div class="section-header">
          <mat-icon>compare_arrows</mat-icon>
          <span class="text-xs font-bold">MARKET SPREAD</span>
        </div>
        <div class="spread-data">
          <div class="data-item">
            <span class="text-secondary text-xs">BID</span>
            <span class="mono text-success">2,945.10</span>
          </div>
          <div class="spread-indicator">
            <div class="spread-bar"></div>
            <span class="spread-val mono">0.40</span>
          </div>
          <div class="data-item">
            <span class="text-secondary text-xs">ASK</span>
            <span class="mono text-danger">2,945.50</span>
          </div>
        </div>
      </section>

      <!-- AI Insights Section -->
      <section class="detail-card ai-section">
        <div class="section-header">
          <div class="header-left">
            <mat-icon>psychology</mat-icon>
            <span class="text-xs font-bold">GEMINI ANALYTICS</span>
          </div>
          <button type="button" class="analyze-btn" (click)="analyzeOrder()" [disabled]="isAiLoading">
            {{ isAiLoading ? '...' : 'ANALYZE' }}
          </button>
        </div>
        <div class="ai-body">
          <mat-progress-bar mode="indeterminate" *ngIf="isAiLoading" class="mini-loader"></mat-progress-bar>
          <p class="explanation text-sm" *ngIf="aiExplanation">{{ aiExplanation }}</p>
          <p class="placeholder text-xs text-muted" *ngIf="!aiExplanation && !isAiLoading">
            Ready for execution analysis...
          </p>
        </div>
      </section>
    </div>
  </div>
</div>
