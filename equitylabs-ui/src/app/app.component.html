<ng-container *ngIf="!isAuthPage()">
  <mat-toolbar class="main-nav">
    <div class="nav-container">
      <!-- Left: Logo -->
      <div class="brand" routerLink="/home">
        <span class="logo-text">EQUITY<span class="highlight">LABS</span></span>
      </div>

      <!-- Center: Navigation Links -->
      <nav class="nav-links">
        <a routerLink="/home" routerLinkActive="active">HOME</a>
        <a routerLink="/markets" routerLinkActive="active">MARKETS</a>
        <a routerLink="/terminal" routerLinkActive="active">TERMINAL</a>
        <a routerLink="/portfolio" routerLinkActive="active">PORTFOLIO</a>
        <a routerLink="/analytics" routerLinkActive="active">ANALYTICS</a>
      </nav>

      <!-- Right: User Menu -->
      <div class="user-menu">
        <ng-container *ngIf="authService.isAuthenticated(); else guestLink">
          <div class="user-profile" routerLink="/profile">
            <span class="username">{{ authService.currentUser()?.username }}</span>
            <div class="avatar">
              {{ getInitials() }}
            </div>
          </div>
        </ng-container>
        <ng-template #guestLink>
          <button class="btn-primary btn-sm" routerLink="/auth">SIGN IN</button>
        </ng-template>
      </div>
    </div>
  </mat-toolbar>

  <app-ticker-bar></app-ticker-bar>
</ng-container>

<main [class.content-area]="!isAuthPage()">
  <router-outlet></router-outlet>
</main>
